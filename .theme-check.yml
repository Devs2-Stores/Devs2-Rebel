# .theme-check.yml — Cấu hình Shopify Theme Check
extends: :default

# Cho phép file lớn hơn trong giai đoạn migrate
TemplateLength:
  enabled: true
  max_length: 600

AssetSizeCSS:
  enabled: true
  threshold_in_bytes: 150000

AssetSizeJavaScript:
  enabled: true
  threshold_in_bytes: 150000

# Tạm tắt trong quá trình migrate — bật lại sau
DeprecatedTag:
  enabled: false

RemoteAsset:
  enabled: true
